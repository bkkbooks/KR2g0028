body:
  text: 宋寶祐四年登科録卷四廷對䇿文天祥臣恭惟皇帝陛下處常之久當泰之交以二帝三皇之道㑹諸心將三紀于此矣臣等鼓舞於鳶飛魚躍之天皆道體流行中之一物不自意得旅進于陛下之庭而陛下且嘉之論道道之不行也久矣陛下之言及此天地神人之福也然臣所未解者今日已當道久化成之時道洽政治之候而方歉焉有志勤道逺之疑豈望道而未之見耶臣請泝太極動靜之根推聖神功化之驗就以聖問中不息一語為陛下勉幸陛下試埀聽焉臣聞天地與道同一不息聖人之心與天地同一不息上下四方之宇往古來今之宙其間百千萬變之消息盈虛百千萬事之轉移闔闢何莫非道所謂道者一不息而已矣道之隱於渾淪藏於未雕未琢之天當是時無極太極之體也自太極分而隂陽則隂陽不息道亦不息隂陽散而五行則五行不息道亦不息自五行又散而為人心之仁義禮智剛柔善惡則乾道成男坤道成女穹壤間生生化化之不息而道亦與之相為不息然則道一不息天地亦一不息天地之不息固道之不息者為之聖人出而為天地立心為生民立命為往聖繼絶學為萬世開太平亦不過以一不息之心充之充之而修身治人此一不息也充之而致知以至齊家治國平天下此一不息也充之而自精神心術以至於禮樂刑政亦此一不息也自有三墳五典以來以至於太平六典之世帝之所以帝王之所以王皆自其一念之不息者始秦漢以降而始離非道之離也知道者之鮮也雖然其間英君誼辟固有號為稍稍知道矣而又沮於行道之不力知務德化矣而不能不尼之以黃老知施仁義矣而不能不遏之以多欲知四年行仁矣而不能不畫之以近效上下二三千年間牽補過時架漏度日毋怪夫駁乎無以議為也獨惟我朝式克至于今日休陛下傳列聖之心以㑹藝祖之心㑹藝祖之心以參帝王之心參天地之心三十三年間臣知陛下不貮以二不參以三茫乎天運窅爾神化此心之天混兮闢兮其無窮也然臨御浸久持循浸熟而算計見效猶未有以大快聖心者上而天變不能以盡無下而民生不能以盡遂人才士習之未甚純國計兵力之未甚充以至盜賊兵戈之警所以貽宵旰之憂者尤所不免然則行道者殆無驗也邪臣則以為道非無驗之物也道之功化甚深也而不可以為迂道之證效甚遲也而不可以為速維天之命於穆不已天地之所以為天地也之德之純純亦不已聖人之所以為聖人也為治顧力行何如耳焉有行道於嵗月之暫而遽責其驗之為迂且逺邪臣之所望於陛下者法天地之不息而已姑以近事言則責躬之言方發而隂雨旋霽是天變未嘗不以道而弭也賑饑之典方舉而都民歡呼是民生未嘗不以道而安也論辨建明之詔一頒而人才士習稍稍渾厚招填條具之㫖一下而國計兵力稍稍充實安吉慶元之小獲維揚瀘水之雋功無非憂勤於道之明驗也然以道之極功論之則此淺效耳速效耳指淺效速效而遽以為道之極功則漢唐諸君之用心是也陛下行帝而帝行王而王而肯襲漢唐事邪此臣所以贊陛下之不息也陛下儻自其不息者而充之則與隂陽同其化與五行同其運與乾坤生生化化之理同其無窮雖充而為三紀之風移俗易可也雖充而為四十年圄空刑措可也雖充而為百年德洽於天下可也雖充而為卜世過厯億萬年敬天之休可也豈止於聖問八者之事可徐就理而已哉臣謹昧死上愚對臣伏讀聖䇿曰蓋聞道之大原出於天超乎無極太極之妙而實不離乎日用事物之常根乎隂陽五行之賾而實不外仁義禮智剛柔善惡之際天以澄著地以靖謐人極以昭明何莫由斯道也聖聖相傳同此一道由修身而治人由致知而齊家治國平天下本之於精神心術達之於禮樂刑政其體甚微其用則廣歷千萬世而不可易然功化有淺深證效有遲速何歟朕以寡昧臨政願治于兹歷年志愈勤道愈逺窅乎其未眹也朕心疑焉子大夫明先王之術咸造在廷必有切至之論朕將虛已以聽臣有以見陛下遡道之本原求道之功效且疑而質之臣等也臣聞聖人之心天地之心也天地之道聖人之道也分而言之則道自道天地自天地聖人自聖人合而言之則道一不息也天地一不息也聖人亦一不息也臣請遡其本原言之茫茫堪輿坱圠無垠渾渾元氣變化無端人心仁義禮智之性未賦也人心剛柔善惡之氣未禀也當是時未有人心先有五行未有五行先有隂陽未有隂陽先有無極太極未有無極太極則太虛無形冲漠無朕而先有此道未有物之先而道具焉道之體也既有物之後而道行焉道之用也其體則微其用甚廣即人心而道在人心即五行而道在五行即隂陽而道在隂陽即無極太極而道在無極太極貫顯微兼費隱包小大通物我道何以若此哉道之在天下猶水之在地中地中無往而非水天下無往而非道水一不息之流也道一不息之用也天以澄著則日月星辰循其經地以靖謐則山川草木順其常人極以昭明則君臣父子安其倫流行古今綱紀造化何莫由斯道也一日而道息焉雖三才不能以自立道之不息功用固如此夫聖人體天地之不息者也天地以此道而不息聖人亦以此道而不息聖人立不息之體則斂於修身推不息之用則散於治人立不息之體則寓於致知以下之工夫推不息之用則顯於齊家治國平天下之效驗立不息之體則本之精神心術之微推不息之用則達之禮樂刑政之著聖人之所以為聖人者猶天地之所以為天地也道之在天地間者常久而不息聖人之於道其可以頃刻息邪言不息之理者莫如大易莫如中庸大易之道至於乾道變化各正性命保合太和而聖人之論法天乃歸之自强不息中庸之道至於溥博淵泉上天之載無聲無臭而聖人之論配天地乃歸之不息則久豈非乾之所以剛健中正純粹精也者一不息之道耳是以法天者亦以一不息中庸之所以高明博厚悠久無疆者一不息之道耳是以配天地者亦以一不息以不息之心行不息之道聖人即不息之天地也陛下臨政願治于兹厯年前此不息之嵗月猶日之自朝而午今此不息之嵗月猶日之至午而中此正勉强行道大有功之日也陛下勿謂數十年間我之所以擔當宇宙把握天地未嘗不以此道至于今日而道之驗如此其迂且逺矣以臣觀之道猶百里之途也今日則適六七十之候也進於道者不可以中道而廢遊於途者不可以中途而畫孜孜矻矻而不自已焉則適六七十里者固所以為至百里之階也不然自止於六七十里之間則百里雖近焉能以一武到哉道無淺功化行道者何可以深為迂道無速證效行道者何可以遲為逺惟不息則能極道之功化惟不息則能極道之證效氣機動蕩於三極之間神采灌注於萬有之表要自陛下此一心始臣不暇逺舉請以仁宗皇帝事為陛下陳之仁祖一不息之天地也康定之詔曰只勤抑畏慶厯之詔曰不敢荒寧皇祐之詔曰緬念為君之難深惟履位之重慶厯不息之心即康定不息之心也皇祐不息之心即慶厯不息之心也當時仁祖以道德感天心以福祿勝人力國家綏靖邉鄙寧謐若可以已矣而猶未也至和元年仁祖之三十三年也方且露立仰天以畏天變碎通天犀以救民生處賈黯吏銓之職擢公弼殿柱之名以厚人才以昌士習納景初减用之言聽范鎮新兵之諫以裕國計以强兵力以至講周禮薄征緩刑而拳拳以盜賊為憂選將帥明紀律而汲汲以西戎北塞為慮仁祖之心至此而不息則與天地同其悠久矣陛下之心仁祖之心也范祖禹有言欲法堯舜惟法仁祖臣亦曰欲法帝王惟法仁祖法仁祖則可至天德願加聖心焉臣伏讀聖䇿曰三墳以上云云豈道之外又有法歟臣有以見陛下慕帝王之功化證效而亦意其各有淺深遲速也臣聞帝王行道之心一不息而已矣堯之兢兢舜之業業禹之孜孜湯之栗栗文王之不已武王之無二成王之無逸皆是物也三墳逺矣五典猶有可論者臣嘗以五典所載之事推之當是時日月星辰之順以道而順也鳥獸草木之若以道而若也九功惟叙以道而叙也四夷來王以道而來王也百工以道而熙庶事以道而康光天之下至于海隅蒼生蓋無一而不拜帝道之賜矣垂衣拱手以自逸于土階巖廊之上夫誰曰不可而堯舜不然也方且考績之法重於三嵗無嵗而敢息也授厯之命嚴於四時無月而敢息也凛凛乎一日二日之戒無日而敢息也此猶可也授受之際而堯之命舜乃曰允執厥中夫謂之執者戰兢保持而不敢少放之謂也味斯語也則堯之不息可見矣河圗出矣洛書見矣執中之說未聞也而堯獨言之堯之言贅矣而舜之命禹乃復益之以人心惟危道心惟微惟精惟一之三言夫致察于危微精一之間則其戰兢保持之念又有甚於堯與舜之心其不息又何如哉是以堯之道化不惟驗于七十年在位之日舜之道化不惟驗於五十年財阜之時讀萬世永賴之語則唐虞而下數千百年間天得以為天地得以為地人得以為人者皆堯舜之賜也然功化抑何其深證效抑何其遲歟降是而王非固勞於帝者也太朴日散風氣日開人心之機械日益巧世變之乘除不息而聖人之所以綱維世變者亦與之相為不息焉俗非結繩之淳也治非畫象之古也師不得不誓侯不得不㑹民不得不凝之以政士不得不凝之以禮內外異治不得不以采薇天保之治治之以至六典建官其所以日治曰政曰禮曰教曰刑曰事者亦無非扶世道而不使之窮耳以勢而論之則夏之治不如唐虞商之治又不如夏周之治又不如商帝之所以帝者何其逸王之所以王者何其勞栗栗危懼不如非心黃屋者之為適也始于憂勤不如恭已南面之為安也然以心而觀則舜之業業即堯之兢兢禹之孜孜即舜之業業湯之栗栗即禹之孜孜文王之不已武王之無二成王之無逸何莫非兢兢業業孜孜栗栗之推也道之散於宇宙間者無一日息帝王之所以行道者亦無一日息帝王之心天地之心也尚可以帝者之為逸而王者之為勞耶臣願陛下求帝王之道必求帝王之心則今日之功化證效或可與帝王一視矣臣伏讀聖䇿曰自時厥後云云亦足以維持憑藉者何歟臣有以見陛下陋漢唐之功化證效而且為漢唐世道發一慨也臣聞不息則天息則人不息則理息則欲不息則陽明息則隂濁漢唐諸君天資敏地位髙使稍有進道之心則六五帝四三王亦未有難能者奈何天不足以制人而天反為人所制理之不足以御欲而理反為欲所御陽明不足以勝隂濁而陽明反為隂濁所勝是以勇於進道者少沮于求道者多漢唐之所以不唐虞三代也歟雖然是為不知道者言也其間亦有號為知道者矣漢之文帝武帝唐之太宗亦不可謂非知道者然而亦有議焉先儒嘗論漢唐諸君以公私義利分數多少為治亂三君之心往往不純乎天不純乎人而出入於天人之間不純乎理不純乎欲而出入乎理欲之間不純乎陽明不純乎隂濁而出入乎陽明隂濁之間是以專務德化雖足以陶後元泰和之風然而尼之以黃老則鴈門上郡之警不能無外施仁義雖足以致建元富庶之盛然而遏之以多欲則輪臺末年之悔不能免四年行仁雖足以開正觀升平之治然而畫之以近效則紀綱制度曽不足為再世之慿藉蓋有一分之道心者固足以就一分之事功有一分之人心者亦足以召一分之事變世道汙隆之分數亦係於理欲消長之分數而已然臣嘗思之漢唐以來為道之纍者其大有二一曰雜伯二曰異端時君世主有志於求道者不陷於此則陷於彼姑就三君而言則文帝之心異端纍之也武帝太宗之心雜伯纍之也武帝無得於道憲章六經統一聖真不足以勝其神仙土木之私干戈刑罰之慘其心也荒太宗全不知道閨門之恥將相之誇末年遼東一行終不能以克其血氣之暴其心也驕雜伯一念憧憧往來是固不足以語常久不息之事者若文帝稍有帝王之天資稍有帝王之地步一以君子長者之道待天下而朝錯輩刑名之說未嘗一動其心是不纍於雜伯矣使其以二三十年恭儉之心而移之以求道則後元氣象且將駸駸乎商周進進乎唐虞奈何帝之純心又間於黃老之清淨是以文帝僅得為漢唐之令主而不得一儕於帝王嗚呼武帝太宗纍於雜伯君子固不敢以帝王事望之文帝不為雜伯所纍而不能不纍於異端是則重可惜已臣願陛下監漢唐之跡必監漢唐之心則今日之功化證效將超漢唐數等矣臣伏讀聖䇿曰朕上嘉下樂云云抑化裁推行有未至歟臣有以見陛下念今日八者之務而甚有望乎為道之驗也臣聞天變之來民怨招之也人才之乏士習蠱之也兵力之弱國計屈之也邉患之警盜賊因之也夫陛下以上嘉下樂之勤夙興夜寐之勞悵嵗月之逾邁亦欲以少見吾道之驗耳俯視一世未能差强人意八者之弊臣知陛下為此不滿也陛下分而以八事問臣合而以四事對請得以熟數之於前何謂天變之來民怨招之也天視自我民視天聽自我民聽天明畏自我民明威人心之休戚天心所因以為喜怒者也熙寧間大旱是時河陜流民入京師監門鄭俠畫流民圖以獻且曰陛下南征北伐皆以勝捷之圖來上料無一人以父母妻子遷移困頓皇皇不給之狀為圖以進者覽臣之圖行臣之言十日不雨乞正欺君之罪上為之罷新法十八事京師大雨八日天人之交間不容穟載在經史此類甚多陛下為今日之民生何如邪今之民生困矣自瓊林大盈積於私貯而民困自建章通天頻於營繕而民困自獻助疊見於豪家巨室而民困自和糴不間於閭閻下户而民困自所至貪官暴吏視吾民如家雞圈豕惟所咀啖而民困嗚呼東南民力竭矣書曰怨豈在明不見是圖今尚可謂之不見乎書曰怨不在大亦不在小今尚可謂之小乎生斯世為斯民仰事俯育亦欲各遂其父母妻子之樂而操斧斤淬鋒鍔日夜思所以斬伐其命脉者滔滔皆是然則臘雪靳瑞蟄雷愆期月犯於木星殞為石以至土雨地震之變無怪夫屢書不一書也臣願陛下持不息之心急求所以為安民之道則民生既和天變或於是而弭矣何謂人才之乏士習蠱之也臣聞窮之所養達之所施幼之所學壯之所行今日之修於家他日之行於天子之庭者也國初諸老嘗以厚士習為先務寧收落韻之李迪不取鑿說之賈邊寧收直言之蘇轍不取險怪之劉幾建學校則必欲崇經術復鄉舉則必欲參行藝其後國子監取湖舉法建經學治道邊防水利等齊使學者因其名以求其實當時如程頤徐積吕希哲皆出其中嗚呼此元祐人物之所從出也士習厚薄最關人才從古以來其語如此陛下以為今之士習何如邪今之士大夫之家有子而教之方其幼也則授其句讀擇其不戾於時好不震于有司者俾熟復焉及其長也細書為工纍牘為富持試於鄉校者以是較藝於科舉者以是取青紫而得車馬也以是父兄之所教詔師友之所講明利而已矣其能卓然自拔於流俗者幾何人哉心術既壞於未仕之前則氣節可想於既仕之後以之領郡邑如之何責其為卓茂黃霸以之鎮一路如之何責其為蘇章何武以之曳朝紳如之何責其為汲黯望之奔競於勢要之路者無怪也趨附於權貴之門者無怪也牛維馬縶狗茍蠅營患得患失無所不至者無怪也悠悠風塵靡靡偷俗清芬消歇濁滓橫流惟皇降𠂻秉彛之懿萌蘖於牛羊斧斤相尋之衝者其有幾哉厚今之人才臣以為變今之士習而後可也臣願陛下持不息之心急求所以為淑士之道則士風一淳人才或於是而可得矣何謂兵力之弱國計屈之也謹按國史治平問遣使募京畿淮南兵司馬光言邊臣之請兵無窮朝廷之募兵無已倉庫之粟帛有限百姓之膏血有涯願罷招禁軍訓練舊有之兵自可備禦臣聞古今天下能免於弱者必不能免於貧免於貧者必不能免於弱一利之興一害之伏未有交受其害者今之兵財則交受其害矣自東海城築而調淮兵以防海則兩淮之兵不足自襄樊復歸而併荆兵以城襄則荆湖之兵不足自塵氛蒸於漢水寃血濺于寶峯而正軍忠義空於死徙者過半則川蜀之兵又不足江淮之兵又抽而入蜀又抽而實荆則下流之兵愈不足矣荆湖之兵又分而策應又分而鎮撫則上流之兵愈不足矣夫國之所恃以自衛者兵也而今之兵不足如此國安得而不弱哉扶其弱而歸之强則招兵之䇿今日直有所不得已者然召募方新調度轉急問之大農大農無財問之版曹版曹無財問之餉司餉司無財自嵗幣銀絹外未聞有畫一策為軍食計者是則弱矣而又未免於貧也陛下自攄肝鬲近又創一安邊太平庫専以供軍此藝祖積縑帛以易賊首之心也仁宗皇帝出錢帛以助兵革之心也轉易之間風采立異前日之弱者可強矣然飛芻挽粟給餉餽糧費於兵者幾何而琳宫梵宇照耀湖山土木之費則漏巵也列竈雲屯樵蘇後㸑費於兵者幾何而霓裳羽衣靡金飾翠宫庭之費則尾閭也生熟口劵月給衣糧費於兵者幾何而量珠輦玉幸寵希恩戚畹之費則濫觴也蓋天下之財専以供軍則財未有不足者第重之以浮費重之以冗費則財始瓶罄而罍耻矣如此則雖欲足兵其何以給兵耶臣願陛下持不息之心急求所以為節財之道則財計一充兵力或於是而可强矣何謂邉患之警盜賊因之也謹按國史紹興間楊么寇洞庭連跨數郡大將王􅊅不能制時僞齊挾外使李成寇襄漢么與交通朝廷患之始命嶽飛措置上流已而逐李成擒楊么而荆湖平臣聞外之敵衆不能為中國患而其起也必將納外之侮盜賊而至於通邉境則腹心之大患也已今之所謂敵者固可畏矣然而逼我蜀則蜀帥策瀘水之勳窺我淮則淮帥奏維揚之凱莫測其心固不可以一捷止之然使之無得氣去則中國之技未為盡出其下彼亦猶畏中國之有其人也獨惟舊海在天一隅敵人穴之者數年于兹颶風瞬息一葦可航彼未必不朝夕為趨浙計然而未能焉短于舟疏于水懼吾唐島之有李寶在耳然洞庭之湖烟水沈寂而浙右之湖濤瀾沸驚區區土地且謂有楊么之漸矣淂之京師之耆老皆以為此人出沒倐閃往來翕霍駕舟如飛運柂如神而我之舟師不及焉夫東南之長技莫如舟師我之勝烏珠於金山者以此我之斃金亮於采石者以此而今此曹反挾之以制我不武甚矣萬一或出於楊么之計則前日李成之不得志于荆者未必今日之不得志於浙也曩聞山東荐饑有司貪市𣙜之利空蘇湖根本以資之廷紳猶謂互易安知無為其鄉道者一夫登岸萬事瓦裂又聞魏村江灣福山三寨水軍興販鹽課以資敵人廷紳猶謂是以扞衛之師為商賈之事以防拓之卒開鄉道之門憂時識治之見往往如此肘腋之蜂蠆懷袖之蛇蝎是其可以忽乎哉陛下近者命發運兼憲合兵財而一其權是將為滅此朝食之圗矣然屯海道者非無軍控海道者非無將徒有王􅊅數年之勞未聞嶽飛八日之捷子太叔平苻澤之盜恐不如是長此不已臣懼為李成開道地也臣願陛下持不息之心求所以弭釁之道則外難一清邊備或于是而可寬矣臣伏讀聖策曰夫不息則久久則證今胡為而未證歟變則通則久今其可以屢更歟臣有以見陛下久於其道而甚有感乎中庸大易之格言也臣聞天久而不墮也以運地久而不隤也以轉水久而不腐也以流日月星辰而常新也以行天下之凡不息者皆以久也中庸之不息即所以為大易之變通大易之變通即所以驗中庸之不息變通者之久固肇于不息者之久也蓋不息者其心變通者其跡其心不息故其跡亦不息游乎六合之內而縱論乎六合之外生乎百世之下而追想乎百世之上神化天造天運無端發微不可見充周不可窮天地之所以變通固自其不息者為之聖人之久於其道亦法天地而已矣天地以不息而久聖人亦以不息而久外不息而言久焉皆非所以久也臣嘗讀無逸一書見其享國之久者有四君焉而其間三君為最久臣求其所以久者中宗之心嚴恭寅畏也高宗之心不敢荒寧也文王之心無淫于逸于遊于畋也是三君者皆無逸而已矣彼之無逸臣之所謂不息也一無逸而其效如此然則不息者非所以久歟陛下之行道蓋非一朝夕之暫矣寶紹以來則涵養此道端平以來則發揮此道嘉熙以來則把握此道嘉熙而淳祐淳祐而寶祐十餘年間無非持循此道之嵗月陛下處此也庭燎未輝臣其宵衣以待日中中至昃臣知其玉食弗遑夜漏已下臣知其丙枕無寐聖人之運亦可謂不息矣然既往之不息者易方來之不息者難久而不息者易愈久而愈不息者難昕臨大庭百辟星布陛下之心此時固不息矣暗室屋漏之隱試一警省則亦能不息否乎日御經筵學士雲集陛下之心此時固不息矣宦官女子之近試一循察則亦能不息乎不息於外者固不能保其不息於內不息於此者固不能保其不息於彼乍勤乍怠乍作乍輟則不息之純心間矣如此則陛下雖欲久則證臣知中庸九經之治未可以朝夕見也雖欲通則久臣知繫辭十三卦之功未可以嵗月計也淵蜎蠖濩之中虛明應物之地此全在陛下自斟酌自執持頃刻之力不繼則證久之功俱廢矣可不戒哉可不懼哉陛下之所以䇿臣者悉矣臣之所以忠于陛下者亦既略陳于前矣而陛下策之篇終復曰子大夫熟之復之勿激勿泛以副朕詳延之意臣伏讀聖䇿至此陛下所謂詳延之意蓋可識已夫陛下自即位以來未嘗以直言罪士不惟不罪之以直言而且導之以直言臣等嘗恨無繇一至天子之庭以吐其素所蓄積幸見録於有司得以借玉階方寸地此正臣等披露肺肝之日也方將明目張膽謇謇諤諤言天下事陛下乃戒之以勿激勿泛夫泛固不切矣若夫激者忠之所發也陛下胡併與激者之言而厭之邪厭激者之言則是將胥臣等而為容容唯唯之歸邪然則臣將為激者歟將為泛者歟抑將遷就陛下之說而姑為不激不泛者歟雖然奉對大庭而不激不泛者固有之矣臣於漢得一人焉曰董仲舒方武帝之策仲舒也慨然以欲聞大道之要為問帝之求道其心蓋甚鋭矣然道以大言帝將求之虛無渺𡨕之鄉也使仲舒于此過言之則激淺言之則泛仲舒不激不泛淂一說曰正心武帝方將求之虛無渺𡨕之鄉仲舒乃告之以真實淺近之理兹陛下所謂切至之論也奈何武帝自恃其區區英明之資超偉之識謂其自足以淩跨六合籠駕八表而顧如此語忽焉仲舒以江都去而武帝所與論道者他有人矣臣固嘗為武帝惜也堂堂天朝固非漢比而臣之賢亦萬不及仲舒然亦不敢激不敢泛切於聖問之所謂道者而淂二說焉以為陛下獻陛下試采覽焉一曰重宰相以開公道之門臣聞公道在天地間不可一日壅閼所以昭蘇而滌決之者宰相責也然扶公道者宰相之責而主公道者天子之事天子而侵宰相之權則公道已矣三省樞密謂之朝廷天子所與謀大政出大令之地也政令不出於中書昔人謂之斜封墨敕非盛世事國初三省紀綱甚正中書造命門下審覆尚書奉行宫府之事無一不統於宰相是以李沆猶得以焚立妃之詔王旦猶得以沮節度之除韓琦猶淂出空頭敕以逐內侍杜衍猶淂封還內降以裁僥幸蓋宰相之權尊則公道始有所依而立也令陛下之所以為公道計者非不悉矣以夤緣戒外戚是以公道責外戚也以裁制戒內司是以公道責內司也以舍法用例戒羣臣是以公道責外廷也雷霆發蔀星日燭幽天下於此咸服陛下之明然或謂比年以來大庭除授於義有所未安於法有所未便者悉以聖㫖行之不惟諸司升補上瀆宸奎而統師躐級閣職超遷亦以夤緣而得恩澤矣不惟姦贓湔洗上勞渙汗而選人通籍姦胥逭刑亦以鑽刺而拜寵命矣甚至閭閻瑣屑之鬬訟皂𨽻猥賤之干求悉逹內庭盡由中降此何等蟣蝨事而陛下以身親之大臣幾於為奉承風㫖之官三省幾於為奉行文書之府臣恐天下公道自此壅矣景祐間罷內降凡詔令皆由中書樞密院仁祖之所以主張公道者如此令進言者猶以事當間出睿斷為說嗚呼此亦韓絳告仁祖之辭也朕固不憚自有處分不如先盡大臣之慮而行之仁祖之所以諭絳者何說也奈何復以絳之說啓人主以奪中書之權是何心哉宣靖間創御筆之令蔡京坐東廊專以奉行御筆為職其後童貫梁師成用事而天地為之分裂者數世是可鍳矣臣願陛下重宰相之權正中書之體凡內批必經由中書樞密院如先朝故事則天下幸甚宗社幸甚二曰收君子以夀直道之脉臣聞直道在天地間不可一日頽靡所以光明而張主之者君子責也然扶直道者君子之責而主直道者人君之事人君而至於沮君子之氣則直道已矣夫不直則道不見君子者直道之倡也直道一倡於君子昔人謂之鳯鳴朝陽以為清朝賀國朝君子氣節大振有魚頭參政有鶻擊臺諫有鐵面御史軍國之事無一不得言於君子是以司馬光猶得以殛守忠之姦劉摯猶得以折李憲之橫范祖禹猶得以罪宋用臣張震猶得以擊龍大淵曽覿蓋君子之氣伸則直道始有所附而行也今陛下之所以為直道計者非不至矣月有供課是以直道望諫官也日有輪劄是以直道望廷臣也有轉對有請對有非時召對是以直道望公卿百執事也江海納汙山藪藏疾天下於此咸服陛下之量然或謂比年以來外廷議論於已有所未協於情有所未忍者悉以聖意斷之不惟言及乘輿上勤節貼而小小豫奪小小廢置亦且寢罷不報矣不惟事關廊廟上煩調停而小小抨彈小小紏劾亦且宣諭不已矣甚者意涉區區之貂璫論侵瑣瑣之姻婭不恤公議反出諫臣此何等狐鼠輩而陛下以身庇之御史至於來和事之譏臺吏至於重訖了之報臣恐天下之直道自此阻矣康定間歐陽修以言事出未幾即召以諫院至和間唐介以言事貶未幾即除以諫官仁祖之所以主直道者如此今進言者猶以臺諫之勢日橫為疑嗚呼兹非富弼忠於仁祖之意也弼傾身下士寧以宰相受臺諫風㫖弼之自處何如也奈何不知弼之意反啓人君以厭君子之言是何心哉元符間置看詳理訴所而士大夫得罪者八百餘家其後鄒浩陳瓘去國無一人敢為天下伸一喙者是可鍳已臣願陛下壯正人之氣養公論之鋒凡以直言去者悉召之于霜臺烏府中如先朝故事則天下幸甚宗社幸甚蓋大道之行天下為公周道如砥其直如矢自古帝王行道者無先於此也臣來自山林有懷欲吐陛下悵然疑吾道之迂逺且慨論乎古今功化之淺深證效之遲速而若有大不滿于今日者臣則以為非行道之罪也公道不在中書直道不在臺諌是以陛下行道用力處雖勞而未遽食道之報耳果使中書得以公道總政要臺諌得以直道糾官邪則陛下雖端冕凝旒於清穆之上所謂功化證效可以立見何至積三十餘年之工力而志勤道逺渺焉未有際耶臣始以不息二字為陛下勉終以公道直道為陛下獻陛下萬幾之暇儻於是而加三思則躋帝王軼漢唐由此其階也已臣賦性踈愚不識忌諱握筆至此不自知其言之過於激亦不自知其言之過於泛冒犯天威罪在不赦惟陛下留神臣謹對御製詩賜狀元文天祥以下理宗道久於心化未成樂聞爾士對延英誠惟不息斯文著治豈多端在力行華國以文由造理事君務實勿沽名得賢功用真無敵能為皇家立太平恭謝詩謝賜進士及第文天祥於皇天子自乘龍三十三年此道中悠逺直參天地化升平奚羡帝王功但堅聖志持常久須使生民見泰通第一臚𫝊新渥重報恩惟有厲清忠門謝表文天祥臣天祥言伏凖省劄五月二十八日三省同奉聖㫖文天祥添差簽書寧海軍節度判官㕔公事仍釐務臣以賜第之初未經門謝未敢祗拜劄命申乞指揮續凖省札七月十一日三省同奉聖㫖今朝謝訖之任臣謹遵奉指揮詣闕庭朝謝者御大廷而發䇿式廣旁招奉清問以攄忠誤承親擢尚阻紫宸之謝遽叨黃紙之除曠世遭逢瞻天感激臣竊以賓興下詔同天地宗祀之彛科舉取人代造化爵賢之柄豈曰利人才之進取其間實天道之流行肆萬乘之臨軒受諸侯之貢士占小善者率以録咸造在廷取一人焉拔其尤必有名世豈應庸瑣可在搜羅臣禀質既凡聞道尤淺才非洛陽之年少偶玷薦書學非川廣之大儒遽塵舉首自叨異數亦既三年回思臚唱之䝉恩莫與鳬趨而奉表有懷就日無路箋天方倣徨於丘園乃寵綏其祿秩輒請展為臣之禮幸許修詣闕之恭兹蓋伏遇皇帝陛下德體乾行道符常久世更三紀逺追成周式化之風嵗啓後庚近接藝祖開基之運凡際風雲之㑹咸依日月之光遂令一介之姓名亦被九重之記録臣敢不誓堅素守勉企前修自揆讀書非為平生溫飽之計願言竭節用副上心忠孝之期臣無任瞻天望聖激切屏營之至謹奉表陳謝以聞宋寶祐四年登科録卷四
