body:
  text: 宋寶祐四年登科録巻一寶祐四年五月八日御試䇿題葢聞道之大原出於天超乎無極太極之妙而實不離乎日用事物之常根乎隂陽五行之賾而實不外乎仁義禮智剛柔善惡之際天以澄著地以靖謐人極以昭明何莫由斯道也聖聖相𫝊同此一道由修身而治人由致知而齊家治國平天下本之精神心術達之禮樂刑政其體甚㣲其用則廣厯千萬世而不可易然功化有淺深證效有遲速者何歟朕以寡昧臨政願治於兹厯年志愈勤道愈逺窅乎其未眹也朕心疑焉子大夫明先聖之術咸造在廷必有切至之論朕將虚已以聴三墳而上大道難名五典以來常道始著日月星辰順乎上鳥獸草木若於下九功惟叙四夷來王百工熙哉庶事康哉非聖神功化之騐歟然人心道心寂寥片語其危微精一之妙不可以言既歟誓何為而畔㑹何為而疑俗何以不若結繩治何以不若畫像以政凝民以禮凝士以天保采薇治内外憂勤危懼僅克有濟何帝王勞逸之殊歟抑隨時損益道不同歟及夫六典建官盖為民極則不過曰治曰教曰禮曰政曰刑曰事而已豈道之外又有法歟自時厥後以理欲之消長驗世道之汙隆隂濁之日常多陽明之日常少刑名雜霸佛老異端無一毫幾乎道駁乎無以議為然務徳化者不能無上郡鴈門之警施仁義者不能無末年輪臺之悔甚而無積仁累徳之素紀綱法度足以維持憑藉者又何歟朕上嘉下樂夙興夜寐靡遑康寜道乆而未洽化乆而未成天變洊臻民生寡遂人才乏而士習浮國計殫而兵力弱苻澤未清邊備孔棘豈道不足以御世歟抑化裁推行有未至歟夫不息則乆乆則證今胡為而未證歟變則通通則乆今其可以屢更歟子大夫􅍄之復之勿激勿泛以副朕詳延之意御試勅差詳定官朝奉大夫新除權吏部侍郎暫兼權中書舍人兼國史院編修官實録院檢討官兼侍講陳大方朝散郎新除起居舍人兼權直學士院時暫兼直舍人院兼國史院編修官實録院檢討官兼侍講林存中大夫新大府卿兼檢正諸房公事饒虎臣編排官中順大夫行大理少卿髙衡孫朝散郎尚書吏部員外郎兼資善堂贊讀皮龍榮初考官奉議郎幹辦行在司審計司鮑成祖朝奉郎行在左藏東西庫封椿下庫安邉庫陳㝱炎文林郎行國子正陳合添差初考官承議郎差充尚書省提領市舶所主管文字呉湜奉議郎行在左蔵西庫徐夢發承直郎主管尚書吏部架閣文字徐彬覆考官朝請大夫尚書工部郎中趙逢龍朝奉大夫行宗正亟兼權尚書左郎官胡大神朝奉大夫行秘書省著作郎兼司封郎官張淵㣲添差覆考官朝奉郎新除大府寺丞余鰲朝奉郎行國子監主簿徐承直郎秘書省正字從政郎行在豐儲西倉斛面官兼機宻鄭初考檢㸃試巻官文林郎特差充臨安觀察推官方熙孫覆考檢㸃試巻官從事郎改添差兩浙西路安撫司幹辦公事王應麟對讀官承直郎差充提領户部犒賞酒庫所幹辦公事陳應星從政郎添差兩浙路轉運司幹辦公事陳問從政郎監行在省倉下界斛面官唐再炳從政郎監行在車路院門余孟成文林郎差充兩浙西路轉運司准偹差遣魏正子封彌官朝請大夫新除大理寺主簿張棻朝散郎幹辦行在諸司糧料院張藴廵捕官朝奉郎將作監主簿呉溥宣教郎行藉田令史椿卿五月二十四日皇帝御集英殿唱名賜進士文天祥以下及第出身同出身共六百一人當日赴期集所六月一日凖勅依格賜進士期集錢一千二百貫文小録錢五百貫文六月七日謝闕六月十三日謁謝先聖先師兖國公鄒國公六月二十九日賜聞喜宴同日降賜御詩於禮部貢院七月一日凖省劄為期集所支用不敷再給降題名小録錢一千七百貫文七月四日拜黄甲同日叙同年於禮部貢院七月二十五日立題名碑石於禮部貢院宋寳祐四年登科録巻一
