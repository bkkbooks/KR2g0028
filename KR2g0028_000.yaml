body:
  text: 寶祐四年登科録傳記類三總錄之屬提要臣等謹案寶祐四年登科録四巻宋文天祥榜進士題名也首列御試䇿題一道及詳定編排等官姓名其覆考撿㸃試巻官為王應麟故宋史文天祥𫝊載考官王應麟奏其巻稱古誼若龜鑑忠肝如鐵石敢為國家得人賀也其一甲第九人為王應鳯即應麟之弟盖當時法制猶疎未有回避之例耳天祥本列第五理宗親擢第一其第二甲第二人為謝枋得第二十七人為陸秀夫與天祥並以孤忠勁節搘拄綱常數百年後睹其姓名尚凜然生敬則此録流傳不朽若有神物呵䕶者豈偶然哉五甲第一百八十九人朱㫼以下原本脱去二十四人今檢録中四甲二百二十七人趙與溥下注兄與鎮同榜而録無其名又栝蒼彚紀有趙時陳塈衡州府志有羅雷春萬姓統譜有趙良金並稱寳祐四年進士而此録亦無之則皆在所闕内矣後有天祥對䇿一道理宗御製賜進士詩及天祥恭謝詩各一首天祥是年登第後即丁父憂歸至己未始授籖書寧海節度判官㕔公事故謝表中有自叨異數亦既三年之語此録並載其表文乃後人所増附者也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d0fdb6dae7137963788a61d7a7013359ad9b81a2dffede06ac362145c054733b
